<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cliniq — Patient Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --primary: #00a67e;
    --primary-dark: #008867;
    --primary-light: #e6f7f1;
    --accent-yellow: #e9c46a;
    --bg: #f6f8fa;
    --card: #ffffff;
    --text: #1f2937;
    --text-muted: #6b7280;
    --border: #edf0f2;
    --shadow: 0 1px 2px rgba(16,24,40,.025);
    --shadow-lg: 0 10px 30px rgba(16,24,40,.12);
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; color: var(--text); background: var(--bg); font-size: 13px; }
  input, textarea, select, button { font-family: inherit; font-size: inherit; color: inherit; }

  svg.ico { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  svg.ico-sm { width: 13px; height: 13px; }
  svg.ico-xs { width: 11px; height: 11px; }

  .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

  /* Sidebar */
  .sidebar { background: #ffffff; padding: 16px 10px; border-right: 1px solid var(--border); position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; color: var(--primary); padding: 2px 8px 14px; }
  .brand-logo { width: 22px; height: 22px; background: var(--primary); border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 12px; }
  .search { display: flex; align-items: center; gap: 7px; padding: 7px 10px; background: #f3f4f6; border-radius: 8px; margin-bottom: 12px; font-size: 12px; color: var(--text-muted); cursor: text; }
  .search input { border: none; background: transparent; outline: none; flex: 1; min-width: 0; font-size: 12px; color: var(--text); }
  .search input::placeholder { color: var(--text-muted); }
  .search .kbd { padding: 1px 5px; background: #fff; border: 1px solid var(--border); border-radius: 4px; font-size: 10px; }
  .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin: 10px 8px 4px; font-weight: 600; }
  .nav-link { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 7px; color: var(--text); cursor: pointer; font-weight: 500; margin-bottom: 1px; font-size: 12.5px; user-select: none; }
  .nav-link:hover { background: #f3f4f6; }
  .nav-link.active { background: var(--primary-light); color: var(--primary-dark); font-weight: 600; }
  .nav-link svg { color: var(--text-muted); }
  .nav-link.active svg { color: var(--primary-dark); }
  .sub-link { padding: 5px 10px 5px 34px; color: var(--text-muted); font-size: 12px; cursor: pointer; border-radius: 7px; position: relative; }
  .sub-link::before { content: ""; position: absolute; left: 22px; top: 50%; width: 5px; height: 5px; border-radius: 50%; background: #d1d5db; transform: translateY(-50%); }
  .sub-link:hover { color: var(--text); }
  .sub-link.active { color: var(--primary-dark); font-weight: 600; }
  .sub-link.active::before { background: var(--primary); }
  .sidebar-bottom { margin-top: auto; padding-top: 10px; }

  /* Main */
  .main { padding: 14px 18px 20px; min-width: 0; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; position: relative; }
  .topbar h1 { margin: 0; font-size: 18px; font-weight: 600; }
  .top-actions { display: flex; gap: 8px; align-items: center; color: var(--text-muted); position: relative; }
  .icon-btn { width: 32px; height: 32px; border-radius: 8px; background: #fff; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); position: relative; }
  .icon-btn:hover { background: #f3f4f6; }
  .icon-btn .badge { position: absolute; top: 5px; right: 5px; width: 7px; height: 7px; background: #ef4444; border: 1.5px solid #fff; border-radius: 50%; }
  .avatar-btn { display: flex; align-items: center; gap: 4px; padding: 3px 8px 3px 3px; background: #fff; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--text-muted); }
  .avatar-btn:hover { background: #f3f4f6; }
  .avatar-btn .av { width: 24px; height: 24px; border-radius: 50%; background: var(--primary); color: #fff; font-weight: 600; display: flex; align-items: center; justify-content: center; font-size: 10px; }

  .sub-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .date-chip { padding: 6px 10px; background: #fff; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; color: var(--text); display: inline-flex; gap: 6px; align-items: center; cursor: pointer; }
  .date-chip:hover { background: #f9fafb; }
  .btn-primary { background: var(--primary); color: #fff; border: none; padding: 8px 12px; border-radius: 7px; font-weight: 600; cursor: pointer; display: inline-flex; gap: 6px; align-items: center; font-size: 12px; }
  .btn-primary:hover { background: var(--primary-dark); }

  .grid { display: grid; grid-template-columns: 260px 300px minmax(0, 1fr); gap: 12px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 12px; min-width: 0; }

  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-title { display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 13px; }
  .card-title .ico-badge { width: 22px; height: 22px; background: var(--primary-light); color: var(--primary-dark); display: flex; align-items: center; justify-content: center; border-radius: 6px; }
  .menu-dots { color: var(--text-muted); cursor: pointer; display: inline-flex; padding: 4px; border-radius: 6px; }
  .menu-dots:hover { background: #f3f4f6; }

  /* Queue */
  .queue-tabs { display: flex; gap: 3px; background: #f3f4f6; padding: 3px; border-radius: 8px; margin-bottom: 8px; }
  .queue-tab { flex: 1; text-align: center; padding: 5px; border-radius: 6px; font-size: 11.5px; cursor: pointer; color: var(--text-muted); font-weight: 500; }
  .queue-tab.active { background: #fff; color: var(--text); box-shadow: var(--shadow); }
  .queue-list { max-height: 780px; overflow-y: auto; padding-right: 2px; }
  .queue-list::-webkit-scrollbar { width: 5px; }
  .queue-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
  .queue-item { display: flex; align-items: center; gap: 9px; padding: 8px; border-radius: 8px; cursor: pointer; margin-bottom: 3px; border: 1px solid transparent; background: #fff; }
  .queue-item:hover { background: #f9fafb; }
  .queue-item.selected { background: #fff; border-color: var(--primary); }
  .avatar { display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; display: block; object-fit: cover; }
  .queue-item .avatar { width: 38px; height: 38px; border-radius: 50%; background: #e5e7eb; }
  .queue-meta { flex: 1; min-width: 0; }
  .queue-meta .name { font-weight: 600; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-meta .cond { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .queue-empty { padding: 20px 12px; text-align: center; font-size: 12px; color: var(--text-muted); }

  /* Profile */
  .profile-body { text-align: center; padding: 4px 0 10px; }
  .profile-body .avatar-lg { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 8px; background: #e5e7eb; overflow: hidden; }
  .profile-body .p-name { font-weight: 700; font-size: 14px; }
  .profile-body .p-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
  .profile-info { padding: 10px 2px 4px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--border); }
  .info-row { display: flex; gap: 9px; align-items: flex-start; padding-top: 3px; }
  .info-row .ico-badge { width: 22px; height: 22px; background: #f3f4f6; color: var(--text-muted); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .info-row .label { font-size: 10.5px; color: var(--text-muted); }
  .info-row .value { font-size: 12px; font-weight: 500; margin-top: 1px; word-break: break-word; }
  .profile-actions { display: flex; gap: 7px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .profile-actions button { flex: 1; padding: 7px; border-radius: 7px; font-weight: 600; cursor: pointer; font-size: 12px; border: none; }
  .btn-ghost { background: #f3f4f6; color: var(--text); }
  .btn-ghost:hover { background: #e8ebf0; }

  /* Appointments */
  .appt-list { display: flex; flex-direction: column; gap: 14px; max-height: 360px; overflow-y: auto; padding: 4px 2px 4px 6px; margin-top: 2px; position: relative; }
  .appt-list::-webkit-scrollbar { width: 5px; }
  .appt-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
  .appt-item { position: relative; padding-left: 22px; }
  .appt-item::before { content: ""; position: absolute; left: 0; top: 3px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 0 3px rgba(0,166,126,.18); z-index: 1; }
  .appt-item:not(:last-child)::after { content: ""; position: absolute; left: 4px; top: 16px; bottom: -16px; width: 2px; background: #e5e7eb; }
  .appt-date { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .appt-card { background: #f6f8fa; border-radius: 9px; padding: 9px 11px; }
  .appt-card .type { font-weight: 600; font-size: 12.5px; }
  .appt-card .dr { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Vitals */
  .vitals-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .bp-value { font-size: 22px; font-weight: 700; }
  .bp-value small { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-left: 3px; }
  .bp-legend { display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); align-items: center; }
  .bp-legend .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .chart-wrap { height: 120px; margin-top: 6px; position: relative; }
  .chart-wrap-sm { height: 44px; margin-top: 2px; }
  .pulse-value, .spo2-value { font-size: 20px; font-weight: 700; }
  .pulse-value small, .spo2-value small { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-left: 4px; }
  .spo2-bar { height: 22px; background: #f3f4f6; border-radius: 5px; overflow: hidden; margin: 10px 0 6px; position: relative; }
  .spo2-bar-fill { height: 100%; background: linear-gradient(90deg, #e9c46a 0%, #d6a756 100%); border-radius: 5px; }
  .axis-caption { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--text-muted); }

  /* About */
  .about-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 2px; }
  .about-tile { display: flex; gap: 9px; align-items: flex-start; padding: 2px; }
  .about-tile .ico-badge { width: 26px; height: 26px; background: #f3f4f6; color: var(--text-muted); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .about-tile .label { font-size: 10.5px; color: var(--text-muted); }
  .about-tile .value { font-size: 12px; font-weight: 600; margin-top: 2px; }
  .surgery-badge { display: inline-flex; gap: 5px; align-items: center; font-size: 10.5px; padding: 2px 7px; border-radius: 12px; font-weight: 600; margin-top: 4px; }
  .surgery-yes { background: #ffe8e8; color: #b42318; }
  .surgery-no { background: var(--primary-light); color: var(--primary-dark); }
  .surgery-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* Reports */
  .reports-header { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; margin-bottom: 8px; }
  .reports-header .t { font-weight: 600; font-size: 13px; }
  .toggle { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); cursor: pointer; user-select: none; }
  .toggle-switch { width: 28px; height: 16px; background: #d1d5db; border-radius: 20px; position: relative; transition: background .2s; }
  .toggle-switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: #fff; border-radius: 50%; transition: transform .2s; }
  .toggle.on .toggle-switch { background: var(--primary); }
  .toggle.on .toggle-switch::after { transform: translateX(12px); }
  .reports-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .report-tile { display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: #f9fafb; border-radius: 9px; }
  .report-tile.inactive { opacity: .55; }
  .pdf-ico { width: 28px; height: 32px; background: #fff5f5; border: 1px solid #fde3e3; color: #d62828; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .report-meta { flex: 1; min-width: 0; }
  .report-meta .fname { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .report-meta .fsize { font-size: 10.5px; color: var(--text-muted); margin-top: 1px; }
  .dl-ico { color: var(--text-muted); cursor: pointer; display: inline-flex; padding: 4px; border-radius: 5px; }
  .dl-ico:hover { color: var(--primary); background: var(--primary-light); }

  /* Generic views */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
  .kpi-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; }
  .kpi-label { font-size: 11.5px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .kpi-label .ico-badge { width: 22px; height: 22px; background: var(--primary-light); color: var(--primary-dark); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .kpi-value { font-size: 22px; font-weight: 700; margin-top: 6px; }
  .kpi-delta { font-size: 11px; color: var(--primary-dark); margin-top: 2px; }

  .panel-grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
  .list-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .list-table th { text-align: left; padding: 10px 12px; background: #f9fafb; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; border-bottom: 1px solid var(--border); }
  .list-table th:first-child { border-top-left-radius: 8px; }
  .list-table th:last-child { border-top-right-radius: 8px; }
  .list-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .list-table tr:last-child td { border-bottom: none; }
  .list-table tr.clickable { cursor: pointer; }
  .list-table tr.clickable:hover td { background: #f9fafb; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; background: #f3f4f6; color: var(--text-muted); }
  .tag-green { background: var(--primary-light); color: var(--primary-dark); }
  .tag-red { background: #ffe8e8; color: #b42318; }
  .tag-amber { background: #fff7e6; color: #ad7b00; }

  .dept-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .dept-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
  .dept-card .t { font-weight: 600; font-size: 14px; }
  .dept-card .s { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
  .dept-card .n { font-size: 28px; font-weight: 700; margin-top: 14px; color: var(--primary-dark); }
  .dept-card .m { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(16,24,40,.45); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; width: 460px; max-width: 92vw; max-height: 88vh; overflow-y: auto; padding: 22px; box-shadow: var(--shadow-lg); }
  .modal h2 { margin: 0 0 4px; font-size: 17px; font-weight: 700; }
  .modal .sub { color: var(--text-muted); font-size: 12.5px; margin-bottom: 14px; }
  .form-row { margin-bottom: 10px; }
  .form-row label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; background: #fff; font-size: 12.5px; outline: none; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--primary); }
  .form-row textarea { resize: vertical; min-height: 90px; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  /* Toast */
  .toast-wrap { position: fixed; top: 16px; right: 16px; z-index: 1100; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: #1f2937; color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 12.5px; box-shadow: var(--shadow-lg); animation: slideIn .2s ease-out; }
  @keyframes slideIn { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Dropdown */
  .dropdown { position: absolute; top: 44px; right: 0; background: #fff; border-radius: 10px; box-shadow: var(--shadow-lg); min-width: 280px; padding: 8px; z-index: 900; display: none; border: 1px solid var(--border); }
  .dropdown.open { display: block; }
  .dropdown-head { padding: 8px 10px; font-weight: 600; font-size: 12.5px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .dropdown-item { padding: 8px 10px; border-radius: 7px; font-size: 12px; cursor: pointer; display: flex; gap: 10px; align-items: flex-start; }
  .dropdown-item:hover { background: #f3f4f6; }
  .dropdown-item .d { font-weight: 600; }
  .dropdown-item .s { color: var(--text-muted); font-size: 11px; margin-top: 1px; }

  .loading { padding: 30px; text-align: center; color: var(--text-muted); }
  .error { padding: 16px; background: #fff3f3; color: #b42318; border-radius: 10px; margin: 20px; }
  .empty { padding: 40px; text-align: center; color: var(--text-muted); background: #fff; border-radius: 12px; }
  .empty svg { width: 36px; height: 36px; margin-bottom: 10px; color: #d1d5db; }

  @media (max-width: 1280px) {
    .grid { grid-template-columns: 240px 280px minmax(0, 1fr); }
    .about-grid { grid-template-columns: repeat(2, 1fr); }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 1024px) {
    .grid { grid-template-columns: 1fr; }
    .vitals-row { grid-template-columns: 1fr; }
    .dept-grid { grid-template-columns: 1fr 1fr; }
    .panel-grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
/* ---------- state ---------- */
const DATA = { patients: [], vitals: [], appts: [], diagnoses: [] };
const STATE = {
  route: 'patient',
  selectedId: null,
  queueFilter: 'all',
  searchQuery: '',
  chartRange: 'all',
  showInactive: false,
  bpChart: null, pulseChart: null, admissionChart: null,
};

/* ---------- utils ---------- */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const initialsFor = name => name.split(' ').map(s => s[0]).slice(0, 2).join('').toUpperCase();
const avatarUrl = name => `https://api.dicebear.com/7.x/personas/svg?seed=${encodeURIComponent(name)}`;
const fmtDate = s => s ? new Date(s).toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
const fmtDateShort = s => s ? new Date(s).toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }) : '—';
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

function mockPhone(id) { const n = parseInt(id.replace(/\D/g,''),10)||0; return `+1 (555) ${String(100+(n%900)).padStart(3,'0')}-${String(1000+(n*7%9000)).padStart(4,'0')}`; }
function mockEmail(name) { return name.toLowerCase().replace(/\s+/g,'.')+'@cliniq.health'; }
function mockAddress(id) {
  const n = parseInt(id.replace(/\D/g,''),10)||0;
  const streets = ['Oak Street','Maple Ave','Elm Road','Pine Blvd','Cedar Lane','Birch Way'];
  const cities = ['Mumbai, IN','Bengaluru, IN','Delhi, IN','Pune, IN','Chennai, IN'];
  return `${n%999} ${streets[n%streets.length]}, ${cities[n%cities.length]}`;
}
function mockComplaint(cond, dx) {
  const m = { 'Cardiology':'Chest pain, shortness of breath','Anxiety Disorder':'Persistent worry, restlessness','Cancer':'Fatigue, unexplained weight loss','Diabetes':'Excessive thirst, frequent urination','Anesthesiology':'Post-operative recovery','Behavioral Issues':'Mood swings, sleep disturbance' };
  return m[cond] || dx;
}

function toast(msg) {
  const w = $('#toastWrap');
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  w.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function openModal(html) {
  $('#modal').innerHTML = html;
  $('#modalOverlay').classList.add('open');
}
function closeModal() { $('#modalOverlay').classList.remove('open'); }
$('#modalOverlay').addEventListener('click', e => { if (e.target.id === 'modalOverlay') closeModal(); });

function downloadReport(name, body) {
  const blob = new Blob([body], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast(`Downloaded ${name}`);
}

/* ---------- load ---------- */
function loadCSV(path) {
  return new Promise((resolve, reject) => {
    Papa.parse(path, { download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
      complete: r => resolve(r.data), error: e => reject(e) });
  });
}

async function loadAll() {
  try {
    const [patients, vitals, appts, diagnoses] = await Promise.all([
      loadCSV('../data/patients.csv'),
      loadCSV('../data/vitals.csv'),
      loadCSV('../data/appointments.csv'),
      loadCSV('../data/diagnoses.csv'),
    ]);
    DATA.patients = patients.filter(p => p.patient_id);
    DATA.vitals = vitals.filter(v => v.patient_id);
    DATA.appts = appts.filter(a => a.patient_id);
    DATA.diagnoses = diagnoses.filter(d => d.patient_id);

    const dates = DATA.patients.map(p => new Date(p.admission_date)).sort((a,b)=>a-b);
    if (dates.length) {
      const fmt = d => d.toLocaleDateString('en-US',{month:'short', year:'numeric'});
      $('#dateRange').textContent = `${fmt(dates[0])} – ${fmt(dates[dates.length-1])}`;
    }
    STATE.selectedId = DATA.patients[1]?.patient_id || DATA.patients[0].patient_id;
    navigate(location.hash.slice(2) || 'patient');
  } catch (e) {
    $('#root').innerHTML = `<div class="error"><strong>Could not load CSVs.</strong> Serve over HTTP from project root, then open /dashboard/.<br>${e}</div>`;
  }
}

/* ---------- routing ---------- */
const ROUTES = { dashboard: 'Dashboard', doctor: 'Doctors', patient: 'Patient Profile', appointment: 'Appointments', departments: 'Departments', reports: 'Reports', contacts: 'Contacts', settings: 'Settings', integrations: 'Integrations', help: 'Help Center' };

function navigate(r) {
  if (!ROUTES[r]) r = 'patient';
  STATE.route = r;
  location.hash = '#/' + r;
  $('#pageTitle').textContent = ROUTES[r];
  $$('.nav-link, .sub-link').forEach(el => el.classList.toggle('active', el.dataset.route === r));
  $('#addPatientBtn').style.display = (r === 'patient' || r === 'dashboard') ? 'inline-flex' : 'none';
  $('#dateRangeChip').style.display = (r === 'patient' || r === 'dashboard') ? 'inline-flex' : 'none';
  renderView();
}

window.addEventListener('hashchange', () => navigate(location.hash.slice(2) || 'patient'));

function renderView() {
  const root = $('#root');
  if (STATE.route === 'patient') { renderPatientView(); return; }
  const view = VIEWS[STATE.route];
  root.innerHTML = view ? view() : `<div class="empty">Page not found</div>`;
  if (STATE.route === 'dashboard') renderAdmissionChart();
}

/* ---------- patient view (primary) ---------- */
function renderPatientView() {
  $('#root').innerHTML = patientViewHTML();
  buildQueue();
  $$('.queue-tab').forEach(t => t.addEventListener('click', () => {
    $$('.queue-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    STATE.queueFilter = t.dataset.filter;
    buildQueue();
  }));
  const tog = $('#showInactiveToggle');
  if (tog) tog.addEventListener('click', () => {
    STATE.showInactive = !STATE.showInactive;
    tog.classList.toggle('on', STATE.showInactive);
    renderReports();
  });
  selectPatient(STATE.selectedId);
}

function patientViewHTML() {
  return `<div class="grid">
    <div class="col">
      <div class="card">
        <div class="card-header"><div class="card-title">Patient Queue</div>
          <span class="menu-dots" title="Search"><svg class="ico ico-sm"><use href="#i-search"/></svg></span></div>
        <div class="queue-tabs">
          <div class="queue-tab ${STATE.queueFilter==='all'?'active':''}" data-filter="all">All</div>
          <div class="queue-tab ${STATE.queueFilter==='old'?'active':''}" data-filter="old">Old</div>
          <div class="queue-tab ${STATE.queueFilter==='new'?'active':''}" data-filter="new">New</div>
        </div>
        <div class="queue-list" id="queueList"></div>
      </div>
    </div>
    <div class="col">
      <div class="card">
        <div class="card-header"><div class="card-title">Patient Profile</div>
          <span class="menu-dots" onclick="openEditPatient()" title="Edit"><svg class="ico ico-sm"><use href="#i-edit"/></svg></span></div>
        <div class="profile-body">
          <div class="avatar avatar-lg" id="profileAvatar">—</div>
          <div class="p-name" id="profileName">—</div>
          <div class="p-sub" id="profileSub">—</div>
        </div>
        <div class="profile-info">
          <div class="info-row"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-phone"/></svg></div><div><div class="label">Phone Number</div><div class="value" id="profPhone">—</div></div></div>
          <div class="info-row"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-mail"/></svg></div><div><div class="label">Email Address</div><div class="value" id="profEmail">—</div></div></div>
          <div class="info-row"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-pin"/></svg></div><div><div class="label">Address</div><div class="value" id="profAddr">—</div></div></div>
        </div>
        <div class="profile-actions">
          <button class="btn-ghost" onclick="openEditPatient()">Edit</button>
          <button class="btn-primary" style="flex:1;justify-content:center;" onclick="openMessage()">Message</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Appointments</div>
          <span class="menu-dots" onclick="openAddAppointment()" title="Add appointment"><svg class="ico ico-sm"><use href="#i-plus"/></svg></span></div>
        <div class="appt-list" id="apptList"></div>
      </div>
    </div>
    <div class="col">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-heart-pulse"/></svg></div>Blood Pressure</div>
          <div class="bp-legend">
            <span><span class="dot" style="background:#00a67e;"></span>Systolic Pressure</span>
            <span><span class="dot" style="background:#e9c46a;"></span>Diastolic Pressure</span>
            <span class="menu-dots" onclick="cycleChartRange()" title="Change range"><svg class="ico ico-sm"><use href="#i-dots-v"/></svg></span>
          </div>
        </div>
        <div class="bp-value"><span id="bpValue">—</span><small>mmHg</small></div>
        <div class="chart-wrap"><canvas id="bpChart"></canvas></div>
      </div>
      <div class="vitals-row">
        <div class="card">
          <div class="card-header"><div class="card-title"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-activity"/></svg></div>Pulse Rate</div>
            <span class="menu-dots" onclick="cycleChartRange()"><svg class="ico ico-sm"><use href="#i-dots-v"/></svg></span></div>
          <div class="pulse-value"><span id="pulseValue">—</span><small>bpm</small></div>
          <div class="chart-wrap-sm"><canvas id="pulseChart"></canvas></div>
          <div class="axis-caption"><span>beats per minute</span><span id="pulseScale">60</span></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-droplet"/></svg></div>Blood oxygen level</div>
            <span class="menu-dots"><svg class="ico ico-sm"><use href="#i-dots-v"/></svg></span></div>
          <div class="spo2-value"><span id="spo2Value">—</span>%<small id="spo2Label">Normal</small></div>
          <div class="spo2-bar"><div class="spo2-bar-fill" id="spo2Bar" style="width:0%"></div></div>
          <div class="axis-caption"><span>SpO₂ saturation</span><span>100</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-user"/></svg></div>About Patient</div>
          <span class="date-chip" id="rangeChip" onclick="cycleChartRange()" title="Change range"><svg class="ico ico-sm"><use href="#i-calendar"/></svg>${STATE.chartRange==='all'?'All time':STATE.chartRange==='7'?'Last 7 days':'Last 30 days'}</span></div>
        <div class="about-grid">
          <div class="about-tile"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-file"/></svg></div><div><div class="label">Patient Complaint</div><div class="value" id="aboutComplaint">—</div></div></div>
          <div class="about-tile"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-building"/></svg></div><div><div class="label">Floor / Ward</div><div class="value" id="aboutWard">—</div></div></div>
          <div class="about-tile"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-calendar"/></svg></div><div><div class="label">Admission Date</div><div class="value" id="aboutAdmit">—</div></div></div>
          <div class="about-tile"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-clock"/></svg></div><div><div class="label">Potential release date</div><div class="value" id="aboutRelease">—</div></div></div>
          <div class="about-tile"><div class="ico-badge"><svg class="ico ico-sm"><use href="#i-stethoscope"/></svg></div><div><div class="label">Doctor's Diagnosis</div><div class="value" id="aboutDx">—</div><span id="aboutSurgery"></span></div></div>
        </div>
        <div class="reports-header"><div class="t">Medical Reports</div>
          <div class="toggle ${STATE.showInactive?'on':''}" id="showInactiveToggle">Show Inactive<div class="toggle-switch"></div></div></div>

}

function buildQueue() {
  const list = $('#queueList');
  if (!list) return;
  const now = new Date();
  const fourteen = 14 * 864e5;
  let pts = DATA.patients.filter(p => {
    if (STATE.searchQuery && !(p.name.toLowerCase().includes(STATE.searchQuery) || p.condition.toLowerCase().includes(STATE.searchQuery))) return false;
    if (STATE.queueFilter === 'new') return now - new Date(p.admission_date) <= fourteen;
    if (STATE.queueFilter === 'old') return now - new Date(p.admission_date) > fourteen;
    return true;
  });

  if (!pts.length) { list.innerHTML = '<div class="queue-empty">No patients match this filter.</div>'; return; }

  list.innerHTML = pts.slice(0, 80).map(p => `
    <div class="queue-item ${p.patient_id===STATE.selectedId?'selected':''}" data-id="${p.patient_id}">
      <div class="avatar"><img src="${avatarUrl(p.name)}" alt=""/></div>
      <div class="queue-meta"><div class="name">${esc(p.name)}</div><div class="cond">${esc(p.condition)}</div></div>
      <span class="menu-dots" data-id="${p.patient_id}" onclick="event.stopPropagation(); openPatientMenu('${p.patient_id}')"><svg class="ico ico-sm"><use href="#i-dots-h"/></svg></span>
    </div>`).join('');
  list.querySelectorAll('.queue-item').forEach(el => el.addEventListener('click', () => selectPatient(el.dataset.id)));
}

function selectPatient(id) {
  if (!id) return;
  STATE.selectedId = id;
  $$('.queue-item').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
  const p = DATA.patients.find(x => x.patient_id === id);
  if (!p || !$('#profileName')) return;
  const dx = DATA.diagnoses.find(x => x.patient_id === id);
  let vs = DATA.vitals.filter(x => x.patient_id === id).sort((a,b) => new Date(a.date) - new Date(b.date));
  if (STATE.chartRange !== 'all') vs = vs.slice(-parseInt(STATE.chartRange, 10));
  const aps = DATA.appts.filter(x => x.patient_id === id).sort((a,b) => new Date(a.date) - new Date(b.date));

  $('#profileAvatar').innerHTML = `<img src="${avatarUrl(p.name)}" alt=""/>`;
  $('#profileName').textContent = p.name;
  $('#profileSub').textContent = `${p.condition} Patient`;
  $('#profPhone').textContent = p.phone || mockPhone(p.patient_id);
  $('#profEmail').textContent = p.email || mockEmail(p.name);
  $('#profAddr').textContent = p.address || mockAddress(p.patient_id);

  renderBP(vs); renderPulse(vs); renderSpo2(vs);

  $('#apptList').innerHTML = aps.length ? aps.map(a => `
    <div class="appt-item"><div class="appt-date">${fmtDate(a.date)}</div>
      <div class="appt-card"><div class="type">${esc(a.type)}</div><div class="dr">${esc(a.doctor)}</div></div></div>`).join('') :
    '<div class="queue-empty">No appointments scheduled.</div>';

  $('#aboutComplaint').textContent = mockComplaint(p.condition, dx?.diagnosis || '');
  $('#aboutWard').textContent = `Floor ${p.floor}, ${p.ward}`;
  $('#aboutAdmit').textContent = fmtDateShort(p.admission_date);
  $('#aboutRelease').textContent = dx ? fmtDateShort(dx.potential_release_date) : 'Unknown';
  $('#aboutDx').textContent = dx ? dx.diagnosis : '—';
  const surg = String(dx?.requires_surgery).toLowerCase() === 'true';
  $('#aboutSurgery').innerHTML = surg
    ? `<br><span class="surgery-badge surgery-yes"><span class="dot"></span>Requires Surgery</span>`
    : `<br><span class="surgery-badge surgery-no"><span class="dot"></span>No Surgery</span>`;

  renderReports();
}

function renderReports() {
  const grid = $('#reportsGrid');
  if (!grid) return;
  const p = DATA.patients.find(x => x.patient_id === STATE.selectedId);
  if (!p) return;
  const reports = reportsForPatient(p);
  const visible = STATE.showInactive ? reports : reports.filter(r => r.active);
  grid.innerHTML = visible.length ? visible.map(r => `
    <div class="report-tile ${r.active ? '' : 'inactive'}">
      <div class="pdf-ico">PDF</div>
      <div class="report-meta"><div class="fname">${esc(r.name)}</div><div class="fsize">${esc(r.size)}</div></div>
      <div class="dl-ico" title="Download" onclick='downloadReport(${JSON.stringify(r.name)}, ${JSON.stringify(r.body)})'><svg class="ico ico-sm"><use href="#i-download"/></svg></div>
    </div>`).join('') : '<div class="queue-empty">No reports available.</div>';
}

function reportsForPatient(p) {
  const dx = DATA.diagnoses.find(x => x.patient_id === p.patient_id);
  const vs = DATA.vitals.filter(x => x.patient_id === p.patient_id);
  const last = vs[vs.length - 1] || {};
  const first = p.name.split(' ')[0].toLowerCase();
  const intake = `CLINIQ — PATIENT INTAKE FORM
=====================================
Patient ID: ${p.patient_id}
Name: ${p.name}
Age / Gender: ${p.age} / ${p.gender}
Admission Date: ${fmtDate(p.admission_date)}
Ward: ${p.ward} (Floor ${p.floor})
Assigned Doctor: ${p.doctor_assigned}
Primary Diagnosis: ${dx?.diagnosis || 'Pending'}
Severity: ${dx?.severity || 'Unassessed'}
Requires Surgery: ${dx?.requires_surgery}
Potential Release: ${fmtDate(dx?.potential_release_date)}
`;
  const labs = `CLINIQ — LAB RESULTS SUMMARY
=====================================
Patient ID: ${p.patient_id}
Name: ${p.name}
Report Date: ${fmtDate(new Date())}
Latest Vitals (${fmtDate(last.date)}):
  Blood Pressure: ${last.systolic_bp}/${last.diastolic_bp} mmHg
  Pulse Rate:     ${last.pulse_rate} bpm
  SpO2:           ${last.spo2}%
Notes:
  Reviewed by ${p.doctor_assigned}.
`;
  return [
    { name: `${first}-intake.pdf`, size: '1.5 MB', active: true, body: intake },
    { name: `lab-results-${p.patient_id}.pdf`, size: '2.1 MB', active: true, body: labs },
    { name: `archive-discharge-draft.pdf`, size: '0.8 MB', active: false, body: 'Discharge draft — pending review.' },
  ];
}

function renderBP(vs) {
  const labels = vs.map(v => new Date(v.date).toLocaleDateString('en-US', { month: 'short' }));
  const sys = vs.map(v => v.systolic_bp); const dia = vs.map(v => v.diastolic_bp);
  const last = vs[vs.length - 1];
  $('#bpValue').textContent = last ? `${last.systolic_bp}/${last.diastolic_bp}` : '—';
  const seen = new Set();
  const cb = (v, i) => { const m = labels[i]; if (seen.has(m)) return ''; seen.add(m); return m; };
  if (STATE.bpChart) STATE.bpChart.destroy();
  const ctx = $('#bpChart').getContext('2d');
  STATE.bpChart = new Chart(ctx, {
    type: 'line', data: { labels, datasets: [
      { label:'Systolic', data:sys, borderColor:'#00a67e', backgroundColor:'transparent', tension:0, pointRadius:0, borderWidth:1 },
      { label:'Diastolic', data:dia, borderColor:'#e9c46a', backgroundColor:'transparent', tension:0, pointRadius:0, borderWidth:1 }]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{mode:'index', intersect:false} },
      scales:{ x:{ticks:{color:'#9ca3af',font:{size:10},callback:cb,autoSkip:false},grid:{display:false},border:{display:false}},
        y:{position:'right',min:60,max:160,ticks:{color:'#9ca3af',font:{size:10},stepSize:40},grid:{display:false},border:{display:false}} }}
  });
}
function renderPulse(vs) {
  const pulse = vs.map(v => v.pulse_rate);
  const last = vs[vs.length - 1];
  $('#pulseValue').textContent = last ? last.pulse_rate : '—';
  if ($('#pulseScale')) $('#pulseScale').textContent = last ? last.pulse_rate : '60';
  if (STATE.pulseChart) STATE.pulseChart.destroy();
  STATE.pulseChart = new Chart($('#pulseChart').getContext('2d'), {
    type:'line', data:{ labels:pulse.map(()=>''), datasets:[{data:pulse,borderColor:'#00a67e',backgroundColor:'transparent',tension:0,pointRadius:0,borderWidth:1}]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} }
  });
}
function renderSpo2(vs) {
  const last = vs[vs.length - 1];
  if (!last) { $('#spo2Value').textContent = '—'; return; }
  $('#spo2Value').textContent = last.spo2;
  $('#spo2Label').textContent = last.spo2 >= 95 ? 'Normal' : last.spo2 >= 90 ? 'Low' : 'Critical';
  $('#spo2Bar').style.width = Math.min(100, Math.max(0, last.spo2)) + '%';
}

function cycleChartRange() {
  STATE.chartRange = STATE.chartRange === 'all' ? '30' : STATE.chartRange === '30' ? '7' : 'all';
  toast(`Range: ${STATE.chartRange === 'all' ? 'all time' : STATE.chartRange + ' days'}`);
  selectPatient(STATE.selectedId);
}

function submitAddPatient() {
  const name = $('#npName').value.trim();
  if (!name) { toast('Name is required.'); return; }
  const maxN = DATA.patients.reduce((m,p) => { const n = parseInt(p.patient_id.replace(/\D/g,''),10); return Math.max(m, n); }, 0);
  const pid = `P${String(maxN+1).padStart(6,'0')}`;
  const cond = $('#npCond').value;
  const ward = $('#npWard').value;
  const floor = DATA.patients.find(p => p.ward === ward)?.floor || 1;
  const today = new Date();
  const release = new Date(today.getTime() + 7*864e5);
  const p = { patient_id: pid, name, age: parseInt($('#npAge').value,10), gender: $('#npGender').value,
    condition: cond, ward, floor, admission_date: today.toISOString().slice(0,10), release_date: release.toISOString().slice(0,10),
    doctor_assigned: $('#npDoc').value };
  DATA.patients.unshift(p);
  DATA.diagnoses.push({ diagnosis_id: `D${Date.now()}`, patient_id: pid, diagnosis: cond, severity: 'Moderate', requires_surgery: 'false', potential_release_date: release.toISOString().slice(0,10) });
  closeModal();
  toast(`Added ${name}.`);
  STATE.selectedId = pid;
  if (STATE.route === 'patient') buildQueue(), selectPatient(pid);
  else navigate('patient');
}

function submitEditPatient() {
  const p = DATA.patients.find(x => x.patient_id === STATE.selectedId);
  if (!p) return;
  p.name = $('#epName').value.trim() || p.name;
  p.phone = $('#epPhone').value.trim();
  p.email = $('#epEmail').value.trim();
  p.address = $('#epAddr').value.trim();
  closeModal(); toast('Patient updated.');
  buildQueue(); selectPatient(p.patient_id);
}

function openMessage() {
  const p = DATA.patients.find(x => x.patient_id === STATE.selectedId);
  if (!p) return;
  openModal(`
    <h2>Message ${esc(p.name)}</h2><div class="sub">Sends to ${esc(p.email || mockEmail(p.name))}</div>
    <div class="form-row"><label>Subject</label><input id="msgSubj" value="Follow-up on your visit"/></div>
    <div class="form-row"><label>Message</label><textarea id="msgBody" placeholder="Write your message…">Hi ${p.name.split(' ')[0]}, checking in on your recovery. Please let us know how you are feeling.</textarea></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()" style="padding:8px 14px;border-radius:7px;">Cancel</button>
      <button class="btn-primary" onclick="closeModal(); toast('Message sent.')"><svg class="ico ico-sm"><use href="#i-send"/></svg>Send</button>
    </div>`);
}

function openAddAppointment() {
  const p = DATA.patients.find(x => x.patient_id === STATE.selectedId);
  if (!p) { toast('Select a patient first.'); return; }
  const today = new Date().toISOString().slice(0,10);
  openModal(`
    <h2>New Appointment</h2><div class="sub">${esc(p.name)} · ${esc(p.doctor_assigned)}</div>
    <div class="form-row"><label>Date</label><input id="apDate" type="date" value="${today}"/></div>
    <div class="form-row"><label>Type</label><select id="apType"><option>Consultation</option><option>Follow-up</option><option>Post-Surgical Care</option></select></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()" style="padding:8px 14px;border-radius:7px;">Cancel</button>
      <button class="btn-primary" onclick="submitAddAppt()">Book</button>
    </div>`);
}
function submitAddAppt() {
  const p = DATA.patients.find(x => x.patient_id === STATE.selectedId);
  DATA.appts.push({ appointment_id: `A${Date.now()}`, patient_id: p.patient_id, date: $('#apDate').value, doctor: p.doctor_assigned, type: $('#apType').value });
  closeModal(); toast('Appointment booked.');
  selectPatient(p.patient_id);
}

function openPatientMenu(id) {
  const p = DATA.patients.find(x => x.patient_id === id);
  if (!p) return;
  openModal(`
    <h2>${esc(p.name)}</h2><div class="sub">${esc(p.patient_id)} · ${esc(p.condition)}</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <button class="btn-ghost" style="padding:10px;border-radius:7px;text-align:left;" onclick="closeModal(); selectPatient('${id}')">View profile</button>
      <button class="btn-ghost" style="padding:10px;border-radius:7px;text-align:left;" onclick="closeModal(); STATE.selectedId='${id}'; openEditPatient()">Edit details</button>
      <button class="btn-ghost" style="padding:10px;border-radius:7px;text-align:left;" onclick="closeModal(); STATE.selectedId='${id}'; openMessage()">Send message</button>
      <button class="btn-ghost" style="padding:10px;border-radius:7px;text-align:left;color:#b42318" onclick="dischargePatient('${id}')">Discharge patient</button>
    </div>`);
}
function dischargePatient(id) {
  const i = DATA.patients.findIndex(x => x.patient_id === id);
  if (i < 0) return;
  const [removed] = DATA.patients.splice(i, 1);
  closeModal(); toast(`${removed.name} discharged.`);
  STATE.selectedId = DATA.patients[0]?.patient_id;
  buildQueue(); if (STATE.selectedId) selectPatient(STATE.selectedId);
}

/* ---------- dropdowns ---------- */
function renderDropdowns() {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayAdmits = DATA.patients.filter(p => (new Date() - new Date(p.admission_date)) < 2*864e5).slice(0,5);
  const notifs = todayAdmits.length ? todayAdmits.map(p => `
    <div class="dropdown-item" onclick="closeAllDropdowns(); navigate('patient'); setTimeout(()=>selectPatient('${p.patient_id}'),50)">
      <div class="avatar" style="width:28px;height:28px;border-radius:8px;background:#e5e7eb;color:#6b7280;font-size:11px;">${initialsFor(p.name)}</div>
      <div><div class="d">New admission: ${esc(p.name)}</div><div class="s">${esc(p.condition)} · ${esc(p.ward)}</div></div>
    </div>`).join('') : '<div class="dropdown-item"><div class="s">No new notifications.</div></div>';

  $('#notifDropdown').innerHTML = `<div class="dropdown-head">Notifications</div>${notifs}`;
  $('#avatarDropdown').innerHTML = `<div class="dropdown-head">Signed in as DR Admin</div>
    <div class="dropdown-item" onclick="navigate('settings'); closeAllDropdowns()"><svg class="ico ico-sm"><use href="#i-settings"/></svg><div><div class="d">Settings</div></div></div>
    <div class="dropdown-item" onclick="navigate('help'); closeAllDropdowns()"><svg class="ico ico-sm"><use href="#i-help"/></svg><div><div class="d">Help Center</div></div></div>
    <div class="dropdown-item" onclick="toast('Signed out (mock).'); closeAllDropdowns()"><svg class="ico ico-sm"><use href="#i-x"/></svg><div><div class="d">Sign out</div></div></div>`;
  $('#moreDropdown').innerHTML = `<div class="dropdown-head">Quick actions</div>
    <div class="dropdown-item" onclick="openAddPatient(); closeAllDropdowns()"><svg class="ico ico-sm"><use href="#i-plus"/></svg><div><div class="d">Add patient</div></div></div>
    <div class="dropdown-item" onclick="exportData(); closeAllDropdowns()"><svg class="ico ico-sm"><use href="#i-download"/></svg><div><div class="d">Export all data</div></div></div>
    <div class="dropdown-item" onclick="location.reload()"><svg class="ico ico-sm"><use href="#i-box"/></svg><div><div class="d">Refresh data</div></div></div>`;
}

function closeAllDropdowns() { $$('.dropdown').forEach(d => d.classList.remove('open')); }

function exportData() {
  const csv = Papa.unparse(DATA.patients);
  downloadReport('cliniq-patients.csv', csv);
}

/* ---------- events ---------- */
$('#bellBtn').addEventListener('click', e => { e.stopPropagation(); const d = $('#notifDropdown'); $('#avatarDropdown').classList.remove('open'); $('#moreDropdown').classList.remove('open'); d.classList.toggle('open'); });
$('#avatarBtn').addEventListener('click', e => { e.stopPropagation(); const d = $('#avatarDropdown'); $('#notifDropdown').classList.remove('open'); $('#moreDropdown').classList.remove('open'); d.classList.toggle('open'); });
$('#moreBtn').addEventListener('click', e => { e.stopPropagation(); const d = $('#moreDropdown'); $('#notifDropdown').classList.remove('open'); $('#avatarDropdown').classList.remove('open'); d.classList.toggle('open'); });
$('#mailBtn').addEventListener('click', () => openMessage());
document.addEventListener('click', closeAllDropdowns);

$$('.nav-link, .sub-link').forEach(el => {
  el.addEventListener('click', () => {
    if (el.dataset.action === 'add-patient') return openAddPatient();
    if (el.dataset.route) navigate(el.dataset.route);
  });
});

$('#addPatientBtn').addEventListener('click', openAddPatient);
$('#sidebarSearch').addEventListener('input', e => {
  STATE.searchQuery = e.target.value.trim().toLowerCase();
  if (STATE.route !== 'patient') navigate('patient');
  else buildQueue();
});

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); $('#sidebarSearch').focus(); }
  if (e.key === 'Escape') closeModal();
});

renderDropdowns();
loadAll();
</script>
</body>
</html>
